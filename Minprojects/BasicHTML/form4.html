<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>EXCERCISE13</title>
    </head>
    <body>
        <form action="/submit_form" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username"  placeholder="Nithin sai" required><br /><br />

            <label for="password">Password:</label>
            <input type="password" id="password"><br /><br />

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="ninsai2007@gmail.com"><br /><br />

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" placeholder="+91 0000000000" pattern="+91 [0-9]{10}"><br /><br />

            <label for="bday">Birthday:</label>
            <input type="date" id="bday" ><br /><br />

            <label for="age">Age:</label>
            <input type="number" id="age" min="1" max="99"><br /><br />

            <label for="title">Title:</label>
            <label for="Mr." >Mr.</label>
            <input type="radio" id="Mr." value="Mr." name="title">
            <label for="Ms.">Ms.</label>
            <input type="radio" id="Ms." value="Ms." name="title">
            <label for="Phd.">Phd.</label>
            <input type="radio" id="Phd." value="Phd." name="title"><br /><br />

            <label for="payment">Payment Method:</label>
            <select id="payment">
                <option value="visa" >VISA</option>
                <option value="card">credit/debit card</option>
                <option value="paypal">paypal</option>
                <option value="UPI">UPI</option>
            </select><br /><br />

            <input type="checkbox" id="subscribe">
            <label for="subscribe">Subscribe</label><br /><br />

            <label for="comment">Comments:</label>
            <textarea id="comment" placeholder="Your comments here..." rows="3" cols="25"></textarea><br /><br />

            <input type="color"><br /><br />
            <input type="file"><br /><br />
            <input type="month"><br /><br />
            


            <input type="reset" value="reset"><br /><br />           
            <input type="submit" value ="login">

        </form>   
    </body>
</html>
